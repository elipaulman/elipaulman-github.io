<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Set theme before first paint to avoid a flash of the wrong theme; reads
         the same localStorage key the portfolio's ThemeToggle uses so the two
         stay in sync across navigation. -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
      })();
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6ENGFNQ089"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6ENGFNQ089');
    </script>

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App - Eli Paulman</title>
    <meta name="description" content="Interactive weather app by Eli Paulman" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#0c0e0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Weather App" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/weather.css?v=dev-nocache" />
    <link rel="icon" type="image/x-icon" href="./images/weather-favicon.png" />
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="./css/all.min.css?v=dev-nocache" />
  </head>

  <body>
    <div class="ambient-glow" aria-hidden="true">
      <span class="a1"></span>
      <span class="a2"></span>
      <span class="a3"></span>
    </div>

    <!-- Header -->
    <header class="app-header">
      <div class="app-header-inner">
        <a href="/" class="header-logo">EP<span class="header-logo-dot">.</span></a>
        <span class="header-title">weather</span>
        <div class="header-actions">
          <button type="button" id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle theme">
            <i class="fas fa-sun"></i>
            <span>light</span>
          </button>
          <a href="/" class="header-back">&larr; portfolio</a>
        </div>
      </div>
    </header>

    <!-- Search -->
    <div class="location-input">
      <div class="search-row">
        <input
          type="text"
          id="location-input"
          placeholder="Search city..."
        />
        <button id="get-weather-button">
          <i class="fas fa-search"></i>
        </button>
      </div>
      <div id="location-suggestions" class="location-suggestions"></div>
    </div>

    <div class="container">
      <!-- Weather Controls -->
      <div class="weather-controls">
        <div class="unit-toggle">
          <button id="fahrenheit-btn" class="unit-btn active">&deg;F</button>
          <button id="celsius-btn" class="unit-btn">&deg;C</button>
        </div>
        <button id="refresh-btn" class="refresh-btn" title="Refresh Weather">
          <i class="fas fa-sync-alt"></i>
        </button>
      </div>

      <div class="current-conditions">
        <div class="loading">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Getting your location...</p>
        </div>
      </div>
      <div class="forecast-list app-section">
        <h3 class="section-label">
          <i class="fas fa-calendar-week"></i> 5-Day Forecast
        </h3>
        <div class="forecast-grid" id="forecast-grid">
          <!-- Forecast items will be dynamically generated by JavaScript -->
        </div>
      </div>

      <!-- Weather Chart Container -->
      <div class="weather-chart-container app-section" style="display: none;">
        <h3 class="section-label">
          <i class="fas fa-chart-line"></i> 24-Hour Temperature Trend
        </h3>
        <canvas id="temperatureChart" width="400" height="200"></canvas>
      </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
      <span>Built by <a href="/">Elijah Paulman</a></span>
      <span>&middot;</span>
      <span>OpenWeatherMap API</span>
    </footer>

    <!-- Chart.js CDN for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/analytics.js?v=dev-nocache"></script>
    <script src="./js/weather.js?v=dev-nocache"></script>
  </body>
</html>
